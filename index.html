<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <form class="row g-3">
        <div class="col-md-6">
            <label for="inputnome4" class="form-label">Nome Completo</label>
            <input type="nome" class="form-control" id="inputnome4">
        </div>
        <div class="col-md-6">
            <label for="inputCPF4" class="form-label">CPF</label>
            <input type="number" class="form-control" id="inputCPF4">
        </div>
        </div>

        <div class="col-md-6">
            <label for="inputData" class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control" id="inputData">
        </div>
        <div class="col-md-4">
            <label for="inputTelefone" class="form-label">Telefone</label>
            <input type="number" class="form-control" id="inputTelefone" placeholder="(XX)XXXX-XXXX">

        </div>
        <div class="col-md-2">
            <label for="inputemail" class="form-label">E-mail</label>
            <input type="text" class="form-control" id="inputemail">
        </div>

        <div class="col-12">
            <label for="inputendereco" class="form-label">Endereço Completo</label>
            <input type="text" class="form-control" id="inputendereco" placeholder="1234 Main St">
        </div>

        <div class="col-md-6">
            <label for="inputCidade" class="form-label">Cidade</label>
            <input type="text" class="form-control" id="inputCidade">
        </div>
        <div class="col-md-4">
            <label for="inputEstado" class="form-label">Estado</label>
            <select id="inputEstado" class="form-select">
                <option selected>Ex.: Joinville</option>
                <option></option>
            </select>
        </div>
        <div class="col-md-2">
            <label for="inputCEP" class="form-label">CEP</label>
            <input type="text" class="form-control" id="inputCEP">
        </div>

        <div class="col-md-6">
            <label for="inputCurso4" class="form-label">Curso</label>
            <input type="text" class="form-control" id="inputCurso4">
        </div>
        <div class="col-md-6">
            <label for="inputMatricula4" class="form-label">Matrícula</label>
            <input type="text" class="form-control" id="inputMatricula4">
        </div>
        </div>

        <div class="col-md-6">
            <label for="inputSenha4" class="form-label">Senha</label>
            <input type="text" class="form-control" id="inputSenha4">
        </div>
        <div class="col-md-6">
            <label for="inputConfirmar4" class="form-label">Confirmar senha</label>
            <input type="text" class="form-control" id="inputConfirmar4">
        </div>
        </div>
        
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Cadastro de Alune</button>
        </div>
    </form>
</body>

</html>
